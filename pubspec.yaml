name: grabbit
description: "GrabBit - private, on-device social-media downloader and media manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & navigation
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3

  # Local database
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Platform services
  flutter_secure_storage: ^10.2.0
  local_auth: ^3.0.1
  permission_handler: ^12.0.1
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0

  # UI / utils
  dynamic_color: ^1.8.1
  intl: ^0.20.2
  logger: ^2.7.0
  video_player: ^2.11.1
  chewie: ^1.14.1
  crypto: ^3.0.7
  ffmpeg_kit_flutter_new: ^4.1.0

  # Brand & typography (P7)
  flutter_svg: ^2.3.0        # render the brand SVG mark in-app (resolution-independent)
  google_fonts: ^8.1.0       # Outfit (display) + Inter (body) brand type

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4-dev.1
  drift_dev: ^2.33.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  pigeon: ^26.3.4

  # Brand asset generation (P7) — run manually after the SVG/PNG masters change:
  #   dart run flutter_launcher_icons   &&   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

# Adaptive launcher icon generated from the brand mark. Foreground = white bunny +
# amber chevron; monochrome = silhouette with the chevron hollowed out (Android 13+
# themed icons); background = brand indigo.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/generated/icon_legacy.png"
  adaptive_icon_background: "#5A3FE0"
  adaptive_icon_foreground: "assets/brand/generated/icon_foreground.png"
  adaptive_icon_monochrome: "assets/brand/generated/icon_monochrome.png"

# Branded splash (Android 12+ included). Brand fill behind the white mark.
flutter_native_splash:
  color: "#5A3FE0"
  color_dark: "#121019"
  image: "assets/brand/generated/splash_logo.png"
  android_12:
    color: "#5A3FE0"
    color_dark: "#121019"
    image: "assets/brand/generated/splash_logo.png"
  android: true
  ios: false
  web: false
