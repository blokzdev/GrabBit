name: grabbit
description: "GrabBit - private, on-device social-media downloader and media manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & navigation
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3

  # Local database
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Platform services
  flutter_secure_storage: ^10.2.0
  local_auth: ^3.0.1
  permission_handler: ^12.0.1
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0
  battery_plus: ^6.2.1
  share_plus: ^13.1.0
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0

  # UI / utils
  dynamic_color: ^1.8.1
  intl: ^0.20.2
  logger: ^2.7.0
  video_player: ^2.11.1
  chewie: ^1.14.1
  crypto: ^3.0.7
  ffmpeg_kit_flutter_new: ^4.1.0
  image: ^4.8.0              # P10i-c: header-only decode to read image pixel dimensions on-device (pure-Dart)

  # Brand (P7)
  flutter_svg: ^2.3.0        # render the brand SVG mark in-app (resolution-independent)

  # On-device AI (P10b-2): MediaPipe/LiteRT runtime, loaded embedder-only for the
  # opt-in semantic-search embedder (Gecko); also the planned P12 LLM runtime.
  flutter_gemma: ^0.16.5

  # On-device AI (P12c): pure-Dart Unicode NFKC normalization for the
  # hand-rolled XLM-RoBERTa (Unigram) tokenizer of the multilingual embedder.
  # XLM-R's SentencePiece normalizer is NFKC-equivalent (verified against the
  # HF tokenizer); MIT, no native deps.
  unorm_dart: ^0.3.0

  # Graph visualization (P10c-e): force-directed explorer for a media item's
  # on-device graph neighborhood. Pure-Dart, no native deps.
  graphview: ^1.5.1

  # Charts (P10d-2): on-device Dashboard storage donuts + library-activity bars.
  # Pure-Dart (CustomPainter), no native deps, no telemetry.
  fl_chart: ^1.0.0
  onnxruntime_v2: ^1.23.2+2

  # On-device AI (P12e): whisper.cpp speech-to-text (FFI), MIT. Powers the
  # caption-less transcript fallback. We feed it our own app-managed ggml model
  # file + a 16 kHz mono WAV (made with our existing ffmpeg), so the ffmpeg
  # companion is intentionally omitted (it would clash with ffmpeg_kit_flutter_new).
  whisper_ggml_plus: ^1.5.2

  # On-device AI (P13b-1): ML Kit on-device text recognition (OCR) for image
  # downloads. MIT plugin; the bundled Latin model needs no Google Play Services
  # and runs fully offline — fits the sideloaded/de-Googled posture.
  google_mlkit_text_recognition: ^0.15.1

  # On-device AI (P13b-2): ML Kit on-device translation + language id. MIT
  # plugins; models download over HTTPS (~30 MB/language, English pivot) and run
  # offline after — no Google Play Services required.
  google_mlkit_translation: ^0.13.1
  google_mlkit_language_id: ^0.13.1

  # Things Engine (P16a): pure-Dart HTML parser (dart.dev-maintained) for the
  # curator's direct-parse branch (a) — extract embedded JSON-LD / microdata /
  # OpenGraph from a captured page into a typed schema.org Thing, no model call,
  # on every device. No native deps, no network (fetching is the caller's job).
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3

  # Codegen
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4-dev.1
  drift_dev: ^2.33.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  pigeon: ^26.3.4

  # Brand asset generation (P7) — run manually after the SVG/PNG masters change:
  #   dart run flutter_launcher_icons   &&   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    # The launcher-icon foreground (white bunny + amber chevron) is reused at
    # runtime by the app-bar BrandBadge; it lives in the generated/ subfolder,
    # which `assets/brand/` does not include.
    - assets/brand/generated/icon_foreground.png
    # P12e: a short synthetic (TTS) speech clip — 16 kHz mono WAV — used by the
    # AI-settings transcription self-test. License-clean, no copyrighted media.
    - assets/audio/transcription_sample.wav
    # P14a: the schema.org vocabulary (pinned v30.0), vendored as a read-only asset
    # for on-device Thing validation/grounding (ADR-0001). CC BY-SA 3.0 — see
    # THIRD-PARTY-NOTICES.md and assets/vocab/README.md.
    - assets/vocab/schemaorg-current-https.jsonld
  # Bundled (offline, no runtime fetch) brand type. Variable fonts — weights are
  # selected via fontWeight against the wght axis.
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf

# Adaptive launcher icon generated from the brand mark. Foreground = white bunny +
# amber chevron; monochrome = silhouette with the chevron hollowed out (Android 13+
# themed icons); background = brand indigo.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/generated/icon_legacy.png"
  adaptive_icon_background: "#5A3FE0"
  adaptive_icon_foreground: "assets/brand/generated/icon_foreground.png"
  adaptive_icon_monochrome: "assets/brand/generated/icon_monochrome.png"
  # Masters already bake the 75% safe-zone framing, so don't double-inset.
  adaptive_icon_foreground_inset: 0

# Branded splash (Android 12+ included). Brand fill behind the white mark.
flutter_native_splash:
  color: "#5A3FE0"
  color_dark: "#121019"
  image: "assets/brand/generated/splash_logo.png"
  android_12:
    color: "#5A3FE0"
    color_dark: "#121019"
    image: "assets/brand/generated/splash_logo.png"
  android: true
  ios: false
  web: false
